              state = str(record.get("confirmation_state") or record.get("state") or "found").strip().lower()
              if state == "verified_submitted":
                  stage = "SUBMITTED"
              elif state in {"under_review", "changes_requested"}:
                  stage = "AWAITING_REVIEW"
              elif state in {"approved", "merged"}:
                  stage = "APPROVED_MERGED"
              elif state == "payment_pending":
