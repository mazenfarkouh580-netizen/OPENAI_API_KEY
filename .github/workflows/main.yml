          def extract_reward(text):
              patterns = [
                  (
                      r"/bounty\s*\$"
                      r"([0-9][0-9,]*(?:\.\d{1,2})?)"
                  ),
                  (
                      r"\$"
                      r"([0-9][0-9,]*(?:\.\d{1,2})?)"
                      r"\s*(?:usd\s*)?"
                      r"(?:bounty|reward|prize)"
                  ),
                  (
                      r"(?:bounty|reward|prize)"
                      r"\s*(?:of|is|:|=)?\s*\$"
                      r"([0-9][0-9,]*(?:\.\d{1,2})?)"
                  ),
                  (
                      r"(?:pay|payment|paid)"
                      r"\s*(?:of|is|:|=)?\s*\$"
                      r"([0-9][0-9,]*(?:\.\d{1,2})?)"
                  ),
              ]

              rewards = []

              for pattern in patterns:
                  for match in re.finditer(
                      pattern,
                      text,
                      re.I,
                  ):
                      try:
                          rewards.append(
                              float(
                                  match.group(1).replace(
                                      ",",
                                      "",
                                  )
                              )
                          )
                      except ValueError:
                          pass

              return max(
                  rewards,
                  default=0.0,
              )

          def issue_identity(issue):
              repository = (
                  issue.get("repository_url") or ""
              ).split("/repos/")[-1]

              number = int(
                  issue.get("number") or 0
