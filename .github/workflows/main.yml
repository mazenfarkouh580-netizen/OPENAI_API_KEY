              title_lower = title.lower()
              body_lower = body.lower()

              aggregator_phrases = [
                  "bounty alert",
                  "new opportunities",
                  "new opportunityies",
                  "opportunities found",
                  "opportunityies found",
                  "top opportunities",
                  "new bounties found",
              ]

              if "bountyscout" in repository:
                  return True

              if any(
                  phrase in title_lower
                  for phrase in aggregator_phrases
              ):
                  return True

              if (
                  "bounty-alert" in labels
                  or "bounty alert" in labels
              ):
                  return True

              if (
                  author == "github-actions[bot]"
                  or author.endswith("[bot]")
              ):
                  return True

              linked_issues = re.findall(
                  (
                      r"https://github\.com/"
                      r"[^/\s]+/[^/\s]+/issues/\d+"
                  ),
                  body,
                  re.I,
              )

              if len(set(linked_issues)) >= 3:
                  return True

              if any(
                  phrase in body_lower
                  for phrase in aggregator_phrases
              ):
                  return True

              return False

          def load_previous():
              if not CURRENT_FILE.exists():
                  return {}

              try:
                  payload = json.loads(
                      CURRENT_FILE.read_text(
                          encoding="utf-8"
                      )
                  )

                  return {
                      item.get("url"): item
                      for item in payload.get(
                          "all_verified_results",
                          [],
                      )
                      if item.get("url")
                  }

              except Exception:
                  return {}

          def load_history():
              if not HISTORY_FILE.exists():
                  return []

              try:
                  data = json.loads(
                      HISTORY_FILE.read_text(
                          encoding="utf-8"
                      )
                  )

                  return (
                      data
                      if isinstance(data, list)
                      else []
                  )

              except Exception:
                  return []

          def load_candidate_lifecycle():
              if not CANDIDATE_LIFECYCLE_FILE.exists():
                  return {}
              try:
                  data = json.loads(
                      CANDIDATE_LIFECYCLE_FILE.read_text(
                          encoding="utf-8"
                      )
                  )
                  return data if isinstance(data, dict) else {}
              except Exception:
                  return {}

          def collect_issue_comments(
              repository,
              number,
          ):
              encoded_repo = urllib.parse.quote(
                  repository,
                  safe="/",
              )

              url = (
                  "https://api.github.com/repos/"
                  f"{encoded_repo}/issues/"
                  f"{number}/comments?per_page=100"
              )

              data = safe_api_get(url)

              return (
                  data
                  if isinstance(data, list)
                  else []
              )

          def collect_timeline(
              repository,
              number,
          ):
              encoded_repo = urllib.parse.quote(
                  repository,
                  safe="/",
              )

              url = (
                  "https://api.github.com/repos/"
                  f"{encoded_repo}/issues/"
                  f"{number}/timeline?per_page=100"
              )

              data = safe_api_get(
                  url,
                  accept=(
                      "application/vnd.github+json"
                  ),
              )

              return (
                  data
                  if isinstance(data, list)
                  else []
              )

          def search_linked_pull_requests(
              repository,
              number,
              issue_url,
          ):
              queries = [
                  (
                      f'repo:{repository} '
                      f'is:pr is:open "#{number}"'
                  ),
                  (
                      f'repo:{repository} '
                      f'is:pr "{issue_url}"'
                  ),
              ]

              found = {}

              for query in queries:
                  encoded = urllib.parse.quote(query)

                  url = (
                      "https://api.github.com/"
                      "search/issues"
                      f"?q={encoded}"
                      "&sort=updated"
                      "&order=desc"
                      "&per_page=30"
                  )

                  data = safe_api_get(url)

                  if not isinstance(data, dict):
                      continue

                  for item in data.get(
                      "items",
                      [],
                  ):
                      if "pull_request" not in item:
                          continue

                      html_url = (
                          item.get("html_url") or ""
                      )

                      if html_url:
                          found[html_url] = item

              return list(found.values())

          def verify_candidate(issue):
              title = issue.get("title") or ""
              body = issue.get("body") or ""
              issue_url = (
                  issue.get("html_url") or ""
              )

              repository, number = issue_identity(
                  issue
              )

              labels = sorted(
                  {
                      (
                          label.get("name") or ""
                      ).strip()
                      for label in issue.get(
                          "labels",
                          [],
                      )
                      if (
                          label.get("name") or ""
                      ).strip()
                  }
              )

              comments = collect_issue_comments(
                  repository,
                  number,
              )

              timeline = collect_timeline(
                  repository,
                  number,
              )

              linked_prs = (
                  search_linked_pull_requests(
                      repository,
                      number,
                      issue_url,
                  )
              )

              comment_text = "\n".join(
                  comment.get("body") or ""
                  for comment in comments
              )

              combined_text = (
                  f"{title}\n"
                  f"{body}\n"
                  f"{comment_text}"
              )

              lowered = combined_text.lower()

              timeline_pr_urls = set()

              for event in timeline:
                  source_issue = (
                      (
                          event.get("source") or {}
                      ).get("issue")
                      or {}
                  )

                  if "pull_request" in source_issue:
                      url = (
                          source_issue.get(
                              "html_url"
                          )
                          or ""
                      )

                      if url:
                          timeline_pr_urls.add(url)

              linked_pr_map = {
                  pr.get("html_url"): pr
                  for pr in linked_prs
                  if pr.get("html_url")
              }

              for url in timeline_pr_urls:
                  linked_pr_map.setdefault(
                      url,
                      {
                          "html_url": url,
                          "title": (
                              "Pull request linked "
                              "through issue timeline"
                          ),
                          "state": "unknown",
                          "user": {},
                          "created_at": "",
                          "updated_at": "",
                      },
                  )

              pr_summaries = []
              open_pr_count = 0
              merged_pr_count = 0

              for pr in linked_pr_map.values():
                  state = (
                      pr.get("state") or "unknown"
                  ).lower()

                  pull_data = (
                      pr.get("pull_request") or {}
                  )

                  merged_at = pull_data.get(
                      "merged_at"
                  )

                  if merged_at:
                      merged_pr_count += 1

                  elif state == "open":
                      open_pr_count += 1

                  pr_summaries.append(
                      {
                          "title": (
                              pr.get("title")
                              or "Linked pull request"
                          ),
                          "url": (
                              pr.get("html_url")
                              or ""
                          ),
                          "state": (
                              "merged"
                              if merged_at
                              else state
                          ),
                          "author": (
                              (
                                  pr.get("user")
                                  or {}
                              ).get("login")
                              or ""
                          ),
                          "created_at": (
                              pr.get("created_at")
                              or ""
                          ),
                          "updated_at": (
                              pr.get("updated_at")
                              or ""
                          ),
                      }
                  )

              assignees = [
                  person.get("login") or ""
                  for person in issue.get(
                      "assignees",
                      [],
                  )
                  if person.get("login")
              ]

              reward = extract_reward(
                  f"{title}\n{body}"
              )

              created_age = age_days(
                  issue.get("created_at")
              )

              updated_age = age_days(
                  issue.get("updated_at")
              )

              detail = len(body.strip())

              preferred_matches = sorted(
                  {
                      term
                      for term in PREFERRED_TERMS
                      if term in lowered
                  }
              )

              complexity_matches = sorted(
                  {
                      term
                      for term in COMPLEXITY_TERMS
                      if term in lowered
                  }
              )

              payment_signals = sorted(
                  {
                      term
                      for term in PAYMENT_EVIDENCE_TERMS
                      if term in lowered
                  }
              )

              paypal_signals = sorted({term for term in PAYPAL_TERMS if term in lowered})
              fiat_payment_signals = sorted({term for term in FIAT_PAYMENT_TERMS if term in lowered})
              fast_payment_signals = sorted({term for term in FAST_PAYMENT_TERMS if term in lowered})
              fast_acceptance_signals = sorted({term for term in FAST_ACCEPTANCE_TERMS if term in lowered})
              ai_allowed_signals = sorted({term for term in AI_ALLOWED_TERMS if term in lowered})
              human_only_signals = sorted({term for term in HUMAN_ONLY_TERMS if term in lowered})
              approval_authority_signals = sorted({term for term in APPROVAL_AUTHORITY_TERMS if term in lowered})

              repository_mismatch, advertised_repository = (
                  title_repository_mismatch(
                      title,
                      repository,
                  )
              )

              platform_signals = sorted({
                  platform
                  for platform, terms in CONDITIONAL_PLATFORM_SIGNALS.items()
                  if any(term in lowered for term in terms)
              })
              trusted_platform = None  # No platform is trusted automatically.

              repository_full_name = (
                  repository.lower()
                  if repository
                  else ""
              )
              trusted_repository = False
              payout_program_repository = False

              crypto_signals = sorted({
                  term for term in CRYPTO_TERMS if term in lowered
              })

              funded_payment_platform = bool(
                  any(term in lowered for term in (
                      "funded bounty",
                      "pre-funded bounty",
                      "prefunded bounty",
                      "funds secured",
                  ))
                  and not crypto_signals
              )

              trusted_payout_source = False

              # Prototype qualification is intentionally strict. A promise such
              # as "PayPal", "paid on merge", or a platform name is never proof.
              # Atlas requires explicit funding/escrow language, a fiat method,
              # and fast-payment timing in the same active issue.
              direct_payment_proof = bool(
                  not crypto_signals
                  and funded_payment_platform
                  and fiat_payment_signals
                  and fast_payment_signals
              )

              instant_payment_verified = bool(direct_payment_proof)
              fast_acceptance_verified = bool(fast_acceptance_signals)

              payout_source = (
                  "Issue-level funded fiat payment evidence"
                  if direct_payment_proof
                  else "Unverified promise or discovery signal"
              )

              claimability_signals = sorted({
                  term for term in (
                      "claim this issue",
                      "comment to claim",
                      "open to contributors",
                      "submit a pull request",
                      "first accepted",
                      "available bounty",
                      "unassigned",
                      "ready to claim",
                  )
                  if term in lowered
              })
              blocked_claim_signals = sorted({
                  term for term in (
                      "do not start",
                      "wait for approval",
                      "reserved",
                      "already claimed",
                      "not accepting",
                      "internal only",
                  )
                  if term in lowered
              })
              atlas_capability_signals = sorted({
                  term for term in (
                      "python",
                      "javascript",
                      "typescript",
                      "documentation",
                      "unit test",
                      "parser",
                      "api",
                      "automation",
                      "data",
                      "bug fix",
                      "cli",
                  )
                  if term in lowered
              })
              external_execution_blockers = sorted({
                  term for term in (
                      "app store submission",
                      "google play submission",
                      "hardware required",
                      "physical device required",
                      "paid account required",
                      "identity verification required",
                      "on-site",
                  )
                  if term in lowered
              })

              atlas_can_execute = bool(
                  atlas_capability_signals
                  and not external_execution_blockers
              )
              # CEO fast-claim law: for $0.10-$50 GitHub work, an open issue with
              # no assignee/competing PR and a normal pull-request route is a valid
              # claim path unless the issue explicitly blocks claims or requires a
              # human-only registration, identity, payment, or platform step.
              inferred_pr_claim_path = bool(
                  0.10 <= reward <= 50
                  and not blocked_claim_signals
                  and not assignees
                  and open_pr_count == 0
                  and merged_pr_count == 0
                  and not repository_mismatch
                  and not human_only_signals
                  and not external_execution_blockers
              )
              claimable_now = bool(
                  (claimability_signals or inferred_pr_claim_path)
                  and not blocked_claim_signals
                  and not assignees
              )

              fast_cash_execution_qualified = bool(
                  instant_payment_verified
                  and fast_acceptance_verified
                  and claimable_now
                  and not human_only_signals
                  and not crypto_signals
                  and not repository_mismatch
                  and not assignees
                  and open_pr_count == 0
                  and merged_pr_count == 0
                  and atlas_can_execute
              )

              score = 0
              reasons = []
              risks = []

              if reward >= 1000:
                  score += 25
                  reasons.append(
                      "Very large stated reward"
                  )

              elif reward >= 500:
                  score += 23
                  reasons.append(
                      "Large stated reward"
                  )

              elif reward >= 150:
                  score += 20
                  reasons.append(
                      "Strong stated reward"
                  )

              elif reward >= 50:
                  score += 16
                  reasons.append(
                      "Good stated reward"
                  )

              else:
                  score += 10
                  reasons.append(
                      "Stated paid reward"
                  )

              if detail >= 1200:
                  score += 15
                  reasons.append(
                      "Detailed requirements"
                  )

              elif detail >= 500:
                  score += 11
                  reasons.append(
                      "Useful requirements"
                  )

              elif detail >= 150:
                  score += 6
                  reasons.append(
                      "Basic requirements"
                  )

              else:
                  score -= 8
                  risks.append(
                      "Requirements are too brief"
                  )

              score += min(
                  18,
                  len(preferred_matches) * 3,
              )

              if preferred_matches:
                  reasons.append(
                      "Capability match: "
                      + ", ".join(
                          preferred_matches[:6]
                      )
                  )

              if complexity_matches:
                  score -= min(
                      15,
                      len(complexity_matches) * 4,
                  )

                  risks.append(
                      "Potentially high complexity: "
                      + ", ".join(
                          complexity_matches[:4]
                      )
                  )

              visible_discussion = len(comments)

              if visible_discussion == 0:
                  score += 10
                  reasons.append(
                      "No visible comments"
                  )

              elif visible_discussion <= 3:
                  score += 6
                  reasons.append(
                      "Low visible discussion"
                  )

              elif visible_discussion <= 8:
                  score += 1
                  risks.append(
                      "Moderate visible discussion"
                  )

              else:
                  score -= 8
                  risks.append(
                      "Heavy visible discussion"
                  )

              if created_age is not None:
                  if created_age <= 1:
                      score += 14
                      reasons.append(
                          "Posted within 24 hours"
                      )

                  elif created_age <= 7:
                      score += 10
                      reasons.append(
                          "Posted within 7 days"
                      )

                  elif created_age <= 30:
                      score += 5
                      reasons.append(
                          "Posted within 30 days"
                      )

                  elif created_age > 180:
                      score -= 12
                      risks.append(
                          "Issue may be stale"
                      )

              if (
                  updated_age is not None
                  and updated_age <= 7
              ):
                  score += 4
                  reasons.append(
                      "Recently updated"
                  )

              if "acceptance criteria" in lowered:
                  score += 10
                  reasons.append(
                      "Explicit acceptance criteria"
                  )

              elif (
                  "expected behavior" in lowered
                  or "definition of done" in lowered
              ):
                  score += 7
                  reasons.append(
                      "Expected result is described"
                  )

              elif detail >= 500:
                  score += 3
                  reasons.append(
                      "Review path appears usable"
                  )

              else:
                  risks.append(
                      "Acceptance path requires "
                      "manual confirmation"
                  )

              if assignees:
                  score -= 18
                  risks.append(
                      "Issue already has an assignee"
                  )

              if open_pr_count == 1:
                  score -= 20
                  risks.append(
                      "One competing pull request "
                      "detected"
                  )

              elif open_pr_count >= 2:
                  score -= 30
                  risks.append(
                      f"{open_pr_count} competing "
                      "pull requests detected"
                  )

              if merged_pr_count:
                  score -= 45
                  risks.append(
                      "A linked pull request "
                      "appears merged"
                  )

              if issue.get("locked"):
                  score -= 8
                  risks.append(
                      "Issue discussion is locked"
                  )

              if payment_signals:
                  score += 5
                  reasons.append("Payment-related signal mentioned")

              if paypal_signals:
                  score += 6
                  reasons.append("PayPal payment explicitly mentioned")

              if fast_payment_signals:
                  score += 6
                  reasons.append("Fast-payment timing explicitly mentioned")

              if ai_allowed_signals:
                  score += 5
                  reasons.append("AI/automation participation appears allowed")

              # CEO prototype law: for small rewards, payment-proof risk is accepted.
              # Atlas still requires a real open repository, no crypto, no AI ban,
              # no competing PR, no assignee, matching repository, and executable work.
              quick_win_risk_accepted = bool(
                  0.10 <= reward <= 50
                  and not human_only_signals
                  and not crypto_signals
                  and not repository_mismatch
                  and not assignees
                  and open_pr_count == 0
                  and merged_pr_count == 0
                  and atlas_can_execute
              )

              # CEO law: advertised instant/same-day/within-hours fiat tasks receive
              # EXTRA EXTRA priority. This is a ranking signal, not a payment guarantee.
              instant_payment_priority = bool(
                  0.10 <= reward <= 50
                  and fast_cash_execution_qualified
              )

              if quick_win_risk_accepted:
                  score += 18
                  reasons.append(
                      "Small-reward prototype law accepts unverified-payment risk"
                  )

              if instant_payment_priority:
                  score += 35
                  reasons.append(
                      "EXTRA EXTRA PRIORITY: explicit instant or same-day fiat payment terms"
                  )

              if human_only_signals:
                  score -= 35
                  risks.append("Human-only or AI-prohibited language detected")

              if approval_authority_signals:
                  score += 5
                  reasons.append("Acceptance authority or approval trigger is described")

              if repository_mismatch:
                  score -= 45
                  risks.append(
                      "Advertised repository does not match "
                      "the GitHub issue repository"
                  )

              if not direct_payment_proof and not quick_win_risk_accepted:
                  score -= 18
                  risks.append(
                      "No direct payment proof or funded "
                      "bounty platform detected"
                  )
              elif not direct_payment_proof and quick_win_risk_accepted:
                  risks.append(
                      "Payment unverified; risk accepted under small-reward prototype law"
                  )

              if claimable_now:
                  score += 12
                  reasons.append(
                      "Claim path confirmed or normal pull-request claim path inferred"
                  )
              elif quick_win_risk_accepted:
                  reasons.append("Small-reward claim risk accepted; proceed by pull request")
              else:
                  score -= 12
                  risks.append(
                      "Claim path is missing, blocked, or ambiguous"
                  )

              if atlas_can_execute:
                  score += 10
                  reasons.append(
                      "Task matches Atlas execution capabilities"
                  )
              else:
                  score -= 20
                  risks.append(
                      "Task is not clearly executable by Atlas"
                  )

              if 0.10 <= reward <= 50:
                  score += 10
                  reasons.append("Highest-priority first-payment reward band")
              elif reward <= 100:
                  score += 7
                  reasons.append("High-priority small reward band")
              elif reward <= 250:
                  score += 4
                  reasons.append("Priority reward band")

              if not assignees and open_pr_count == 0:
                  score += 8
                  reasons.append("No assignee and no competing pull request")

              if updated_age is not None and updated_age <= 3:
                  score += 5
                  reasons.append("Very recent activity")

              score = max(
                  0,
                  min(100, score),
              )

              if human_only_signals:
                  availability = "HUMAN-ONLY OR AI PROHIBITED"
                  decision = "REJECT"

              elif crypto_signals:
                  availability = "CRYPTO OR WALLET PAYMENT - BLOCKED"
                  decision = "REJECT"

              elif merged_pr_count:
                  availability = (
                      "LIKELY CLOSED BY WORK"
                  )
                  decision = "REJECT"

              elif assignees and open_pr_count:
                  availability = (
                      "ASSIGNED AND CONTESTED"
                  )
                  decision = "REJECT"

              elif open_pr_count:
                  availability = "CONTESTED"

                  decision = (
                      "PRIORITY REVIEW"
                      if score >= 62
                      else "WATCHLIST"
                  )

              elif assignees:
                  availability = "ASSIGNED"

                  decision = (
                      "WATCHLIST"
                      if score >= 50
                      else "REJECT"
                  )

              elif repository_mismatch:
                  availability = (
                      "REPOSITORY MISMATCH - MANUAL VERIFY"
                  )
                  decision = "WATCHLIST"

              elif instant_payment_priority and score >= 48:
                  availability = (
                      "INSTANT-PAYMENT EXTRA EXTRA PRIORITY - PROTOTYPE RISK ACCEPTED"
                  )
                  decision = "PURSUE"

              elif quick_win_risk_accepted and score >= 48:
                  availability = (
                      "SMALL REWARD AUTO-APPROVED - PAYMENT HISTORY UNVERIFIED"
                  )
                  decision = "PURSUE"

              elif not instant_payment_verified:
                  availability = "PAYMENT SPEED OR FUNDING NOT VERIFIED"
                  decision = "WATCHLIST"

              elif not direct_payment_proof:
                  availability = "PAYMENT NOT PROVEN - WATCHLIST"
                  decision = "WATCHLIST"

              elif not claimable_now:
                  availability = "CLAIM PATH NOT CONFIRMED"
                  decision = "PRIORITY REVIEW"

              elif not atlas_can_execute:
                  availability = "NOT EXECUTION-READY FOR ATLAS"
                  decision = "WATCHLIST"

              elif reward > 50:
                  availability = "OVER $50 - SECONDARY QUEUE"
                  decision = "PRIORITY REVIEW"

              elif score >= 62:
                  availability = (
                      "OPEN - READY FOR FINAL CLAIM CHECK"
                  )
                  decision = "PURSUE"

              elif score >= 48:
                  availability = (
                      "OPEN - NEEDS FINAL REVIEW"
                  )
                  decision = "PRIORITY REVIEW"

              elif score >= 36:
                  availability = "UNCERTAIN"
                  decision = "WATCHLIST"

              else:
                  availability = (
                      "LOW VALUE OR HIGH RISK"
                  )
                  decision = "REJECT"

              # CEO reward law: over $250 stays visible but never enters the main pursue queue.
              if reward > 250 and decision not in {"REJECT"}:
                  availability = "OVER $250 - WATCHLIST ONLY"
                  decision = "WATCHLIST"

              payment_verification = (
                  "SMALL-REWARD RISK ACCEPTED - PAYMENT UNVERIFIED"
                  if quick_win_risk_accepted and not instant_payment_verified
                  else "PROTOTYPE-QUALIFIED: FUNDED + FIAT + FAST TERMS"
                  if instant_payment_verified
                  else "FIAT METHOD MENTIONED - FUNDING/TIMING NOT PROVEN"
                  if fiat_payment_signals
                  else "FUNDING WORDING FOUND - FIAT/TIMING NOT PROVEN"
                  if funded_payment_platform
                  else "FAST-PAY WORDING FOUND - FUNDING NOT PROVEN"
                  if fast_payment_signals
                  else "UNVERIFIED"
              )

              ai_eligibility = (
                  "PROHIBITED" if human_only_signals
                  else "EXPLICITLY ALLOWED" if ai_allowed_signals
                  else "UNCLEAR - MANUAL VERIFICATION REQUIRED"
              )

              approval_authority = (
                  "OWNER/MAINTAINER APPROVAL PATH DESCRIBED"
                  if approval_authority_signals
                  else "NOT VERIFIED"
              )

              fast_pay_candidate = bool(
                  0.10 <= reward <= 50
                  and fast_cash_execution_qualified
              )

              fast_pay_status = (
                  "INSTANT-PAYMENT EXTRA EXTRA PRIORITY"
                  if instant_payment_priority
                  else "FAST-PAY LEAD - PAYMENT NOT GUARANTEED"
                  if fast_pay_candidate
                  else "NOT PROTOTYPE-PAYMENT-QUALIFIED"
              )

              return {
                  "title": title,
                  "url": issue_url,
                  "repository": repository,
                  "issue_number": number,
                  "author": (
                      (
                          issue.get("user") or {}
                      ).get("login")
                      or ""
                  ),
                  "reward": reward,
                  "reward_priority": (
                      "HIGHEST" if 0.10 <= reward <= 50
                      else "HIGH" if reward <= 100
                      else "PRIORITY" if reward <= 250
                      else "WATCHLIST"
                  ),
                  "score": score,
                  "decision": decision,
                  "availability": availability,
                  "created_at": (
                      issue.get("created_at")
                      or ""
                  ),
                  "updated_at": (
                      issue.get("updated_at")
                      or ""
                  ),
                  "comments": visible_discussion,
                  "labels": labels,
                  "assignees": assignees,
                  "open_competing_prs": (
                      open_pr_count
                  ),
                  "merged_linked_prs": (
                      merged_pr_count
                  ),
                  "linked_pull_requests": sorted(
                      pr_summaries,
                      key=lambda pr: (
                          pr.get("updated_at") or ""
                      ),
                      reverse=True,
                  ),
                  "payment_verification": payment_verification,
                  "paypal_signals": paypal_signals,
                  "fiat_payment_signals": fiat_payment_signals,
                  "fast_payment_signals": fast_payment_signals,
                  "fast_acceptance_signals": fast_acceptance_signals,
                  "fast_acceptance_verified": fast_acceptance_verified,
                  "fast_cash_execution_qualified": fast_cash_execution_qualified,
                  "ai_eligibility": ai_eligibility,
                  "approval_authority": approval_authority,
                  "direct_payment_proof": direct_payment_proof,
                  "instant_payment_verified": instant_payment_verified,
                  "instant_payment_priority": instant_payment_priority,
                  "funded_payment_platform": funded_payment_platform,
                  "trusted_payout_source": trusted_payout_source,
                  "trusted_platform": trusted_platform,
                  "platform_signals": platform_signals,
                  "trusted_repository": trusted_repository,
                  "payout_program_repository": payout_program_repository,
                  "payout_source": (
                      f"Payout program repository: {repository_full_name}"
                      if payout_program_repository and not trusted_payout_source
                      else payout_source
                  ),
                  "claimable_now": claimable_now,
                  "quick_win_risk_accepted": quick_win_risk_accepted,
                  "claimability_signals": claimability_signals,
                  "atlas_can_execute": atlas_can_execute,
                  "atlas_capability_signals": atlas_capability_signals,
                  "external_execution_blockers": external_execution_blockers,
                  "repository_mismatch": repository_mismatch,
                  "advertised_repository": advertised_repository,
                  "fast_pay_candidate": fast_pay_candidate,
                  "fast_pay_status": fast_pay_status,
                  "manual_verification_required": bool(
                      repository_mismatch
                      or not direct_payment_proof
                      or not claimable_now
                      or not atlas_can_execute
                      or not (
                          fast_cash_execution_qualified
                          and ai_allowed_signals
                          and approval_authority_signals
                      )
                  ),
                  "reasons": reasons,
                  "risks": risks,
              }

          previous_by_url = load_previous()
          discovery_cache = load_json_file(
              DISCOVERY_CACHE_FILE,
              {"issues": {}, "discovered_by": {}},
          )
          cached_issues = discovery_cache.get("issues", {})
          raw_issues = {
              url: issue
              for url, issue in cached_issues.items()
              if isinstance(issue, dict)
          }
          discovered_by = {
              url: set(workers)
              for url, workers in discovery_cache.get("discovered_by", {}).items()
              if isinstance(workers, list)
          }
          worker_fresh_urls = {"Atlas": set(), "Alex": set()}
          worker_searches_completed = {"Atlas": 0, "Alex": 0}
          worker_raw_hits = {"Atlas": 0, "Alex": 0}

          def run_worker_search(worker_name, queries, sort_mode):
              for query in queries:
                  if api_rate_limited:
                      break

                  encoded = urllib.parse.quote(query)
                  url = (
                      "https://api.github.com/search/issues"
                      f"?q={encoded}"
                      f"&sort={sort_mode}"
                      "&order=desc"
                      "&per_page=100"
                  )
                  data = safe_api_get(url)

                  if not isinstance(data, dict):
                      continue

                  worker_searches_completed[worker_name] += 1

                  for issue in data.get("items", []):
                      if "pull_request" in issue:
                          continue

                      issue_url = issue.get("html_url") or ""
                      if not issue_url:
                          continue

                      worker_raw_hits[worker_name] += 1
                      raw_issues[issue_url] = issue
                      worker_fresh_urls[worker_name].add(issue_url)
                      discovered_by.setdefault(issue_url, set()).add(worker_name)

          # Atlas searches the broad universe by recent activity.
          run_worker_search(
              "Atlas",
              ATLAS_SEARCH_QUERIES,
              "updated",
          )

          # Alex independently searches small/fast work by newest creation.
          run_worker_search(
              "Alex",
              ALEX_SEARCH_QUERIES,
              "created",
          )

          # V50 operational guarantee: Alex must perform real searches, not merely
          # appear in telemetry. If the first search pass completes zero queries,
          # immediately retry with a compact fallback universe.
          alex_retry_triggered = False
          alex_search_failure = False
          if worker_searches_completed["Alex"] == 0:
              alex_retry_triggered = True
              alex_fallback_queries = [
                  'is:issue is:open bounty label:"good first issue"',
                  'is:issue is:open reward label:"help wanted"',
                  'is:issue is:open "$50" in:title,body',
                  'is:issue is:open "$25" in:title,body',
                  'is:issue is:open "small bounty" in:title,body',
              ]
              run_worker_search(
                  "Alex",
                  alex_fallback_queries,
                  "updated",
              )

          if worker_searches_completed["Alex"] == 0:
              alex_search_failure = True
              api_errors.append({
                  "worker": "Alex",
                  "stage": "search",
                  "error": "Alex completed zero search queries after automatic retry",
              })

          fresh_discovery_urls = (
              worker_fresh_urls["Atlas"]
              | worker_fresh_urls["Alex"]
          )
          searches_completed = sum(worker_searches_completed.values())

          # Keep the repository lightweight. Search results can contain very
          # large issue bodies, so persist only the 750 most recently updated
          # records. The current run still evaluates the full in-memory result
          # set; this cap only controls what is carried into future runs.
          def cache_sort_key(pair):
              issue = pair[1]
              return str(
                  issue.get("updated_at")
                  or issue.get("created_at")
                  or ""
              )

          cache_items = sorted(
              raw_issues.items(),
              key=cache_sort_key,
              reverse=True,
          )[:750]
          cache_issues = dict(cache_items)
          cache_urls = set(cache_issues)

          DISCOVERY_CACHE_FILE.write_text(
              json.dumps(
                  {
                      "updated_at": GENERATED_AT,
                      "cache_limit": 750,
                      "total_seen_this_run": len(raw_issues),
                      "issues": cache_issues,
                      "fresh_urls": sorted(
                          fresh_discovery_urls & cache_urls
                      ),
                      "discovered_by": {
                          url: sorted(discovered_by.get(url, set()))
                          for url in cache_issues
                      },
                      "worker_stats": {
                          worker: {
                              "queries_completed": worker_searches_completed[worker],
                              "raw_hits": worker_raw_hits[worker],
                              "unique_fresh": len(worker_fresh_urls[worker]),
                          }
                          for worker in ("Atlas", "Alex")
                      },
                  },
                  indent=2,
                  ensure_ascii=False,
              ),
              encoding="utf-8",
          )

          initial_candidates = []
          rejected_aggregators = 0
          rejected_unsafe = 0
          rejected_no_reward = 0

          for issue in raw_issues.values():
              title = issue.get("title") or ""
              body = issue.get("body") or ""
              text = f"{title}\n{body}"
              lowered = text.lower()

              if is_aggregator(
                  issue,
                  title,
                  body,
              ):
                  rejected_aggregators += 1
                  continue

              if any(
                  term in lowered
                  for term in BLOCKED_TERMS
              ):
                  rejected_unsafe += 1
                  continue

              reward = extract_reward(text)

              if reward <= 0:
                  rejected_no_reward += 1
                  continue

              initial_candidates.append(issue)

          def discovery_priority(issue):
              title = issue.get("title") or ""
              body = issue.get("body") or ""
              lowered = f"{title}\n{body}".lower()
              reward = extract_reward(f"{title}\n{body}")

              if 0.10 <= reward <= 50:
                  reward_band = 5
              elif reward <= 100:
                  reward_band = 4
              elif reward <= 250:
                  reward_band = 3
              elif reward <= 500:
                  reward_band = 1
              else:
                  reward_band = 0

              funded_signal = sum(
                  1 for term in (
                      "funded bounty",
                      "pre-funded bounty",
                      "prefunded bounty",
                      "funds secured",
                      "paid on merge",
                      "payment upon merge",
                      "automatic payout",
                  )
                  if term in lowered
              )

              easy_signal = sum(
                  1 for term in (
                      "good first issue",
                      "documentation",
                      "docs",
                      "test",
                      "tests",
                      "small fix",
                      "quick fix",
                      "beginner",
                      "easy",
                      "typo",
                      "workflow",
                      "github actions",
                  )
                  if term in lowered
              )

              complexity_signal = sum(
                  1 for term in COMPLEXITY_TERMS
                  if term in lowered
              )

              return (
                  reward_band,
                  funded_signal,
                  easy_signal,
                  -complexity_signal,
                  issue.get("updated_at") or "",
              )

          initial_candidates.sort(
              key=discovery_priority,
              reverse=True,
          )

          # V33 reserves verification capacity for both hunters and for
          # small rewards so they cannot disappear behind large speculative items.
          issue_by_url = {
              issue.get("html_url"): issue
              for issue in initial_candidates
              if issue.get("html_url")
          }

          previous_actionable_urls = [
              url
              for url, item in previous_by_url.items()
              if item.get("decision") in {
                  "PURSUE",
                  "PRIORITY REVIEW",
              }
              and url in issue_by_url
          ]

          atlas_candidates = [
              issue for issue in initial_candidates
              if "Atlas" in discovered_by.get(issue.get("html_url"), set())
          ]
          alex_candidates = [
              issue for issue in initial_candidates
              if "Alex" in discovered_by.get(issue.get("html_url"), set())
          ]
          small_candidates = [
              issue for issue in initial_candidates
              if 0.10 <= extract_reward(
                  f"{issue.get('title') or ''}\n{issue.get('body') or ''}"
              ) <= 100
          ]
          alex_small_candidates = [
              issue for issue in small_candidates
              if "Alex" in discovered_by.get(issue.get("html_url"), set())
          ]
          atlas_small_candidates = [
              issue for issue in small_candidates
              if "Atlas" in discovered_by.get(issue.get("html_url"), set())
          ]

          verification_queue = []
          queued_urls = set()

          def add_candidates(candidates, limit):
              added = 0
              for issue in candidates:
                  if added >= limit or len(verification_queue) >= 30:
                      break
                  url = issue.get("html_url")
                  if not url or url in queued_urls:
                      continue
                  verification_queue.append(issue)
                  queued_urls.add(url)
                  added += 1

          # Revenue-first verification allocation. Small rewards are checked once
          # for openness, competition, repository fit, and technical executability;
          # payment proof is not repeatedly fast-verified under the CEO risk law.
          add_candidates(atlas_small_candidates, 10)
          add_candidates(alex_small_candidates, 10)
          add_candidates(
              [issue_by_url[url] for url in previous_actionable_urls],
              3,
          )
          add_candidates(atlas_candidates, 3)
          add_candidates(alex_candidates, 2)
          add_candidates(initial_candidates, 30)

          verified_results = []

          for index, issue in enumerate(
              verification_queue,
              start=1,
          ):
              print(
                  "Verifying candidate "
                  f"{index}/"
                  f"{len(verification_queue)}: "
                  f"{issue.get('html_url')}"
              )

              verified_item = verify_candidate(issue)
              verified_item["discovered_by"] = sorted(
                  discovered_by.get(
                      issue.get("html_url"),
                      set(),
                  )
              )
              verified_item["primary_hunter"] = (
                  "BOTH"
                  if len(verified_item["discovered_by"]) > 1
                  else verified_item["discovered_by"][0]
                  if verified_item["discovered_by"]
                  else "CACHE"
              )
              verified_results.append(verified_item)

          verified_results.sort(
              key=lambda item: (
                  bool(item.get("instant_payment_priority")),
                  bool(item.get("fast_pay_candidate")),
                  item["score"],
                  item["reward"],
              ),
              reverse=True,
          )

          small_fast_wins = [
              item for item in verified_results
              if 0.10 <= item.get("reward", 0) <= 100
              and item.get("decision") != "REJECT"
          ]
          small_fast_wins.sort(
              key=lambda item: (
                  item.get("decision") == "PURSUE",
                  bool(item.get("instant_payment_priority")),
                  item.get("direct_payment_proof", False),
                  item.get("claimable_now", False),
                  item.get("atlas_can_execute", False),
                  item.get("score", 0),
                  -item.get("reward", 0),
              ),
              reverse=True,
          )
          atlas_small_wins = [
              item for item in small_fast_wins
              if "Atlas" in item.get("discovered_by", [])
          ]
          alex_small_wins = [
              item for item in small_fast_wins
              if "Alex" in item.get("discovered_by", [])
          ]
          ready_small_wins = [
              item for item in small_fast_wins
              if (
                  item.get("decision") == "PURSUE"
                  and (
                      item.get("instant_payment_verified")
                      or item.get("quick_win_risk_accepted")
                  )
              )
          ]

          micro_rewards = [
              item for item in small_fast_wins
              if 0.10 <= item.get("reward", 0) < 5
          ]
          trusted_payout_ready = []
          payout_program_reviews = []
          small_target_met = len(ready_small_wins) >= 2
          small_target_status = (
              "ACHIEVED"
              if small_target_met
              else "NOT ACHIEVED"
          )

          meaningful_changes = []

          for item in verified_results:
              previous = previous_by_url.get(
                  item["url"]
              )

              if not previous:
                  item["change"] = "NEW"

                  meaningful_changes.append(
                      {
                          "type": "NEW",
                          "title": item["title"],
                          "url": item["url"],
                          "decision": (
                              item["decision"]
                          ),
                      }
                  )

                  continue

              changed_fields = []

              for field in (
                  "decision",
                  "availability",
                  "reward",
                  "assignees",
                  "open_competing_prs",
                  "merged_linked_prs",
              ):
                  if (
                      previous.get(field)
                      != item.get(field)
                  ):
                      changed_fields.append(field)

              if changed_fields:
                  item["change"] = (
                      "CHANGED: "
                      + ", ".join(changed_fields)
                  )

                  meaningful_changes.append(
                      {
                          "type": "CHANGED",
                          "title": item["title"],
                          "url": item["url"],
                          "fields": changed_fields,
                          "decision": (
                              item["decision"]
                          ),
                      }
                  )

              else:
                  item["change"] = "UNCHANGED"

          # Persistent cross-run execution history. This file is committed by the hunt
          # job and updated after a successful pull-request submission.
          try:
              submissions_history = json.loads(SUBMISSIONS_FILE.read_text(encoding="utf-8")) if SUBMISSIONS_FILE.exists() else {}
              if not isinstance(submissions_history, dict):
                  submissions_history = {}
          except (OSError, json.JSONDecodeError):
              submissions_history = {}

          candidate_lifecycle = load_candidate_lifecycle()
          current_verified_urls = {
              item["url"] for item in verified_results
          }

          lifecycle_new = 0
          lifecycle_still_active = 0
          lifecycle_changed = 0

          for item in verified_results:
              url = item["url"]
              record = candidate_lifecycle.get(url, {})
              first_seen = record.get("first_seen") or GENERATED_AT

              if not record:
                  lifecycle_new += 1
              elif item.get("change", "").startswith("CHANGED"):
                  lifecycle_changed += 1
              else:
                  lifecycle_still_active += 1

              item["first_seen"] = first_seen
              item["last_verified"] = GENERATED_AT

              candidate_lifecycle[url] = {
                  "title": item.get("title"),
                  "repository": item.get("repository"),
                  "first_seen": first_seen,
                  "last_verified": GENERATED_AT,
                  "last_decision": item.get("decision"),
                  "last_availability": item.get("availability"),
                  "last_reward": item.get("reward"),
                  "verification_state": "VERIFIED THIS RUN",
              }

          not_reverified_urls = [
              url
              for url in previous_by_url
              if url not in current_verified_urls
          ]

          for url in not_reverified_urls:
              previous_item = previous_by_url[url]
              record = candidate_lifecycle.get(url, {})
              candidate_lifecycle[url] = {
                  "title": previous_item.get("title"),
                  "repository": previous_item.get("repository"),
                  "first_seen": (
                      record.get("first_seen")
                      or previous_item.get("first_seen")
                      or GENERATED_AT
                  ),
                  "last_verified": (
                      record.get("last_verified")
                      or previous_item.get("last_verified")
                  ),
                  "last_decision": previous_item.get("decision"),
                  "last_availability": previous_item.get("availability"),
                  "last_reward": previous_item.get("reward"),
                  "verification_state": "NOT REVERIFIED THIS RUN",
              }

          CANDIDATE_LIFECYCLE_FILE.write_text(
              json.dumps(
                  candidate_lifecycle,
                  indent=2,
                  ensure_ascii=False,
              ),
              encoding="utf-8",
          )

          lifecycle_summary = {
              "new_this_run": lifecycle_new,
              "still_active": lifecycle_still_active,
              "changed": lifecycle_changed,
              "not_reverified": len(not_reverified_urls),
          }

          counts = {
              decision: sum(
                  item["decision"] == decision
                  for item in verified_results
              )
              for decision in (
                  "PURSUE",
                  "PRIORITY REVIEW",
                  "WATCHLIST",
                  "REJECT",
              )
          }

          gate_counts = {}
          for item in verified_results:
              gate = item.get("availability") or "UNKNOWN"
              gate_counts[gate] = gate_counts.get(gate, 0) + 1

          diagnostic_lines = [
              "# Atlas + Alex V50 Gate Diagnostics",
              "",
              f"Generated: {GENERATED_AT}",
              "",
              "## Decision Counts",
              "",
          ]
          for decision, value in counts.items():
              diagnostic_lines.append(f"- {decision}: {value}")

          diagnostic_lines.extend(["", "## Gate Counts", ""])
          for gate, value in sorted(
              gate_counts.items(),
              key=lambda pair: pair[1],
              reverse=True,
          ):
              diagnostic_lines.append(f"- {gate}: {value}")

          diagnostic_lines.extend(["", "## Candidate Details", ""])
          for item in verified_results:
              diagnostic_lines.extend([
                  f"### {item.get('repository')} #{item.get('issue_number')}",
                  f"- Decision: {item.get('decision')}",
                  f"- Gate: {item.get('availability')}",
                  f"- Reward: ${float(item.get('reward', 0) or 0):,.2f}",
                  f"- Payment: {item.get('payment_verification')}",
                  f"- Payout source: {item.get('payout_source')}",
                  f"- Claimable: {item.get('claimable_now')}",
                  f"- Quick-win risk accepted: {item.get('quick_win_risk_accepted', False)}",
                  f"- Atlas executable: {item.get('atlas_can_execute')}",
                  f"- URL: {item.get('url')}",
                  "",
              ])

          (REPORTS_DIR / "atlas-v33-gate-diagnostics.md").write_text(
              "\n".join(diagnostic_lines),
              encoding="utf-8",
          )

          contested_count = sum(
              item["open_competing_prs"] > 0
              for item in verified_results
          )

          assigned_count = sum(
              bool(item["assignees"])
              for item in verified_results
          )

          top_results = verified_results[:12]

          strong_targets = [
              item
              for item in verified_results
              if item["decision"] == "PURSUE"
              and item["open_competing_prs"] == 0
              and not item["assignees"]
          ]

          status = "HEALTHY"

          if searches_completed == 0 and not verified_results:
              status = "FAILED"

          elif api_errors:
              # A rate-limited secondary search is a warning, not a failed company run,
              # when current or cached candidates were still verified and queued.
              status = "HEALTHY_WITH_WARNINGS"

          def money_total(start=None, end=None, statuses=("paid", "received", "completed")):
              total = 0.0
              for entry in ledger:
                  try:
                      amount = float(entry.get("amount", 0) or 0)
                  except (TypeError, ValueError):
                      continue
                  status_value = str(entry.get("status", "paid")).lower()
                  if status_value not in statuses:
                      continue
                  when = parse_datetime(entry.get("paid_at") or entry.get("date") or entry.get("created_at"))
                  if start and (not when or when < start):
                      continue
                  if end and when and when >= end:
                      continue
                  total += amount
              return round(total, 2)

          today_start = NOW.replace(hour=0, minute=0, second=0, microsecond=0)
          week_start = today_start.replace(day=max(1, today_start.day - today_start.weekday()))
          month_start = today_start.replace(day=1)
          year_start = today_start.replace(month=1, day=1)

          waiting_today = 0.0
          waiting_later = 0.0
          overdue = 0.0
          waiting_unknown = 0.0
          payment_schedule = []
          for entry in ledger:
              status_value = str(entry.get("status", "")).lower()
              if status_value not in ("pending", "waiting", "submitted", "approved"):
                  continue
              try:
                  amount = float(entry.get("amount", 0) or 0)
              except (TypeError, ValueError):
                  amount = 0.0
              expected = parse_datetime(entry.get("expected_at"))
              if expected is None:
                  bucket = "UNKNOWN"
                  waiting_unknown += amount
              elif expected < today_start:
                  bucket = "OVERDUE"
                  overdue += amount
              elif expected < today_start.replace(hour=23, minute=59, second=59):
                  bucket = "TODAY"
                  waiting_today += amount
              else:
                  bucket = "LATER"
                  waiting_later += amount
              payment_schedule.append({
                  "title": entry.get("title", "Untitled payment"),
                  "amount": amount,
                  "expected_at": entry.get("expected_at"),
                  "bucket": bucket,
                  "status": status_value,
              })

          earnings = {
              "today": money_total(today_start),
              "week": money_total(week_start),
              "month": money_total(month_start),
              "year": money_total(year_start),
              "lifetime": money_total(),
              "waiting_today": round(waiting_today, 2),
              "waiting_later": round(waiting_later, 2),
              "overdue": round(overdue, 2),
              "waiting_unknown": round(waiting_unknown, 2),
          }
          earnings["waiting_total"] = round(waiting_today + waiting_later + overdue + waiting_unknown, 2)
          allocations = {
              "tax": round(earnings["year"] * float(config["tax_percent"]) / 100, 2),
              "reinvesting": round(earnings["year"] * float(config["reinvest_percent"]) / 100, 2),
              "mazen": round(earnings["year"] * float(config["mazen_percent"]) / 100, 2),
          }

          # Permanent payer intelligence derived from documented Atlas outcomes.
          payer_intelligence = {}
          payer_rows = {}
          for key, record in submissions_history.items():
              if not isinstance(record, dict):
                  continue
              repository = str(record.get("repository") or "unknown")
              owner = repository.split("/", 1)[0] if "/" in repository else repository
              row = payer_rows.setdefault(repository, {
                  "payer_id": repository,
                  "repository": repository,
                  "owner": owner,
                  "total_paid_opportunities": 0,
                  "total_prs_submitted": 0,
                  "total_prs_merged": 0,
                  "total_prs_rejected": 0,
                  "review_hours": [],
                  "merge_hours": [],
                  "payment_hours": [],
                  "disputed_or_unpaid": 0,
                  "evidence": [],
              })
              state = str(record.get("confirmation_state") or record.get("state") or "").lower()
              if record.get("pr_url") or state in {"submitted", "under_review", "approved", "merged", "payment_pending", "paid", "completed", "rejected"}:
                  row["total_prs_submitted"] += 1
              if state in {"merged", "payment_pending", "paid", "completed"}:
                  row["total_prs_merged"] += 1
              if state in {"rejected", "closed_unmerged", "cancelled", "timed_out"}:
                  row["total_prs_rejected"] += 1
              if state in {"paid", "completed"}:
                  row["total_paid_opportunities"] += 1
              if state in {"disputed", "unpaid"}:
                  row["disputed_or_unpaid"] += 1
              submitted_at = parse_datetime(record.get("submitted_at"))
              reviewed_at = parse_datetime(record.get("reviewed_at") or record.get("confirmed_at"))
              merged_at = parse_datetime(record.get("github_merged_at") or record.get("merged_at"))
              paid_at = parse_datetime(record.get("paid_at") or record.get("received_at"))
              if submitted_at and reviewed_at and reviewed_at >= submitted_at:
                  row["review_hours"].append((reviewed_at - submitted_at).total_seconds() / 3600)
              if submitted_at and merged_at and merged_at >= submitted_at:
                  row["merge_hours"].append((merged_at - submitted_at).total_seconds() / 3600)
              if merged_at and paid_at and paid_at >= merged_at:
                  row["payment_hours"].append((paid_at - merged_at).total_seconds() / 3600)
              for evidence in record.get("confirmation_evidence", []) or []:
                  if evidence not in row["evidence"]:
                      row["evidence"].append(evidence)

          def average(values):
              return round(sum(values) / len(values), 2) if values else None

          for repository, row in payer_rows.items():
              submitted = row["total_prs_submitted"]
              merged = row["total_prs_merged"]
              paid = row["total_paid_opportunities"]
              avg_payment = average(row["payment_hours"])
              acceptance_percentage = round(merged * 100 / submitted, 2) if submitted else 0.0
              payment_percentage = round(paid * 100 / merged, 2) if merged else 0.0
              if row["disputed_or_unpaid"] > 0 and paid == 0:
                  classification, stars, multiplier = "HIGH_RISK_AVOID", "❌", 0.0
              elif paid and avg_payment is not None and avg_payment <= 1:
                  classification, stars, multiplier = "VERIFIED_INSTANT_PAYER", "★★★★★", 1.30
              elif paid and avg_payment is not None and avg_payment <= 24:
                  classification, stars, multiplier = "VERIFIED_SAME_DAY_PAYER", "★★★★☆", 1.20
              elif paid and avg_payment is not None and avg_payment <= 72:
                  classification, stars, multiplier = "VERIFIED_THREE_DAY_PAYER", "★★★☆☆", 1.10
              elif paid:
                  classification, stars, multiplier = "VERIFIED_SLOW_PAYER", "★★☆☆☆", 0.85
              else:
                  classification, stars, multiplier = "UNVERIFIED_PAYER", "★☆☆☆☆", 0.60
              payer_intelligence[repository] = {
                  **{k: v for k, v in row.items() if k not in {"review_hours", "merge_hours", "payment_hours"}},
                  "classification": classification,
                  "stars": stars,
                  "score_multiplier": multiplier,
                  "historical_acceptance_percentage": acceptance_percentage,
                  "historical_payment_percentage": payment_percentage,
                  "average_review_hours": average(row["review_hours"]),
                  "average_merge_hours": average(row["merge_hours"]),
                  "average_payment_hours": avg_payment,
                  "fastest_payment_hours": round(min(row["payment_hours"]), 2) if row["payment_hours"] else None,
                  "slowest_payment_hours": round(max(row["payment_hours"]), 2) if row["payment_hours"] else None,
                  "sample_size": submitted,
                  "last_updated": NOW.isoformat(),
              }
          PAYER_INTELLIGENCE_FILE.write_text(json.dumps(payer_intelligence, indent=2, ensure_ascii=False), encoding="utf-8")

          # Source performance and adaptive focus. Until paid history exists,
          # rank sources by actionable volume and advertised reward while preserving
          # exploration. Paid and accepted results automatically outweigh listings.
          def source_name(item):
              repo = str(item.get("repository") or "unknown")
              lowered = (str(item.get("title") or "") + " " + repo).lower()
              if "opire" in lowered or "paid pr" in lowered:
                  return "Opire"
              if "unsafe" in lowered or "bounty-hunters" in lowered:
                  return "UnsafeLabs"
              if "claude-builders-bounty" in lowered:
                  return "Claude Builders"
              if "aport" in lowered:
                  return "APort"
              if "xevrion" in lowered:
                  return "Xevrion"
              if "cyberninja" in lowered:
                  return "CyberNinja"
              return repo.split("/")[0] if "/" in repo else repo

          source_performance = {}
          for item in verified_results:
              src = source_name(item)
              row = source_performance.setdefault(src, {
                  "found": 0, "pursue": 0, "advertised_value": 0.0,
                  "submitted": 0, "accepted": 0, "paid": 0, "revenue": 0.0,
              })
              row["found"] += 1
              row["advertised_value"] += float(item.get("reward", 0) or 0)
              if item.get("decision") == "PURSUE":
                  row["pursue"] += 1

          for record in submissions_history.values():
              src = source_name(record)
              row = source_performance.setdefault(src, {
                  "found": 0, "pursue": 0, "advertised_value": 0.0,
                  "submitted": 0, "accepted": 0, "paid": 0, "revenue": 0.0,
              })
              state = str(record.get("state", "")).lower()
              if state in {"submitted", "accepted", "paid", "completed"}:
                  row["submitted"] += 1
              if state in {"accepted", "paid", "completed"}:
                  row["accepted"] += 1
              if state in {"paid", "completed"}:
                  row["paid"] += 1
                  row["revenue"] += float(record.get("paid_amount", record.get("reward", 0)) or 0)

          for src, row in source_performance.items():
              row["advertised_value"] = round(row["advertised_value"], 2)
              row["revenue"] = round(row["revenue"], 2)
              row["focus_score"] = round(
                  row["revenue"] * 20
                  + row["paid"] * 100
                  + row["accepted"] * 50
                  + row["submitted"] * 20
                  + row["pursue"] * 8
                  + min(row["advertised_value"], 500) / 10
                  + row["found"],
                  2,
              )

          ranked_sources = sorted(
              source_performance.items(),
              key=lambda pair: pair[1].get("focus_score", 0),
              reverse=True,
          )
          source_rank = {name: index for index, (name, _) in enumerate(ranked_sources)}

          execution_queue = []
          for item in verified_results:
              payment_confidence = max(
                  0,
                  min(
                      100,
                      15
                      + item.get("score", 0) * 0.65
                      + (18 if item.get("direct_payment_proof") else 0)
                      + (12 if item.get("approval_authority") != "NOT VERIFIED" else 0)
                      + (10 if item.get("fast_payment_signals") else 0)
                      - item.get("open_competing_prs", 0) * 18
                      - (22 if item.get("assignees") else 0),
                  ),
              )
              if not item.get("direct_payment_proof"):
                  payment_confidence = min(
                      payment_confidence,
                      49,
                  )
              if item.get("repository_mismatch"):
                  payment_confidence = min(
                      payment_confidence,
                      25,
                  )

              competition_score = max(0, 100 - item.get("open_competing_prs", 0) * 30 - (25 if item.get("assignees") else 0))
              clarity_score = max(0, min(100, 50 + (10 if item.get("acceptance_criteria") else 0) + min(30, len(item.get("evidence", [])) * 5)))
              effort_risk = max(5, min(100, 45 + len(item.get("risks", [])) * 10))
              payer = payer_intelligence.get(str(item.get("repository") or ""), {})
              payer_multiplier = float(payer.get("score_multiplier", 0.60) or 0)
              expected_value = round(item.get("reward", 0) * (payment_confidence / 100) * (competition_score / 100) * payer_multiplier / max(1, effort_risk / 25), 2)
              queue_item = dict(item)
              src = source_name(item)
              queue_item.update({
                  "source": src,
                  "source_focus_score": source_performance.get(src, {}).get("focus_score", 0),
                  "source_rank": source_rank.get(src, 999),
                  "payment_confidence": round(payment_confidence, 1),
                  "competition_score": round(competition_score, 1),
                  "clarity_score": round(clarity_score, 1),
                  "effort_risk": round(effort_risk, 1),
                  "expected_value": expected_value,
                  "payer_classification": payer.get("classification", "UNVERIFIED_PAYER"),
                  "payer_stars": payer.get("stars", "★☆☆☆☆"),
                  "payer_multiplier": payer_multiplier,
                  "historical_acceptance_percentage": payer.get("historical_acceptance_percentage", 0.0),
                  "historical_payment_percentage": payer.get("historical_payment_percentage", 0.0),
              })
              execution_queue.append(queue_item)
          def reward_priority_rank(item):
              reward = float(item.get("reward", 0) or 0)
              if 0.10 <= reward <= 50:
                  return 3
              if reward <= 100:
                  return 2
              if reward <= 250:
                  return 1
              return 0

          execution_queue.sort(
              key=lambda x: (
                  x["decision"] == "PURSUE",
                  bool(x.get("instant_payment_priority")),
                  bool(x.get("fast_pay_candidate")),
                  reward_priority_rank(x),
                  x.get("source_focus_score", 0),
                  x.get("ai_eligibility") == "EXPLICITLY ALLOWED",
                  x["expected_value"],
                  x.get("score", 0),
              ),
              reverse=True,
          )
          execution_queue = execution_queue[:int(config.get("queue_size", 20))]

          operations["version"] = "V50"
          operations["last_updated"] = GENERATED_AT
          operations["pipeline"] = execution_queue
          operations["source_performance"] = source_performance
          operations["source_focus_order"] = [name for name, _ in ranked_sources]
          OPERATIONS_FILE.write_text(json.dumps(operations, indent=2, ensure_ascii=False), encoding="utf-8")

          # V33: reserve distinct, prototype-qualified small PURSUE tasks for immediate workers.
          def execution_key(item):
              return f"{item.get('repository', '')}#{int(item.get('issue_number') or 0)}"

          def execution_history_allows(item):
              record = submissions_history.get(execution_key(item), {})
              state = str(record.get("state", "")).lower()
              if state in {"submitted", "accepted", "paid", "completed"}:
                  return False
              if state in {"reserved", "attempted"}:
                  reserved_at_ts = float(record.get("reserved_at_ts", 0) or 0)
                  if time.time() - reserved_at_ts < RESERVATION_LEASE_SECONDS:
                      return False
              return True

          executable_candidates = [
              item for item in execution_queue
              if item.get("decision") == "PURSUE"
              and 0 < float(item.get("reward", 0) or 0) <= float(config.get("maximum_execution_reward", 250))
              and float(item.get("score", 0) or 0) >= float(config.get("execution_score_floor", 48))
              and not item.get("assignees")
              and int(item.get("open_competing_prs", 0) or 0) == 0
              and not item.get("repository_mismatch")
              and item.get("atlas_can_execute")
              and item.get("ai_eligibility") != "PROHIBITED"
              and (
                  item.get("fast_cash_execution_qualified") is True
                  or (
                      0.10 <= float(item.get("reward", 0) or 0) <= 50
                      and item.get("quick_win_risk_accepted") is True
                  )
              )
              and execution_history_allows(item)
          ]
          executable_candidates.sort(
              key=lambda item: (
                  bool(item.get("instant_payment_priority")),
                  bool(item.get("fast_pay_candidate")),
                  item.get("score", 0),
                  item.get("expected_value", 0),
              ),
              reverse=True,
          )

          selected_executions = []
          repository_dispatch_counts = {}
          # Five execution lanes share one qualification/rule engine.
          # Alex remains the single controller, monitor, repair, and payment-confirmation system.
          # A single repository may occupy at most five slots per run. This prevents one
          # broken test harness or duplicate bounty family from consuming the entire queue.
          worker_names = ["Atlas 1", "Atlas 2", "Atlas 3", "Atlas 4", "Atlas 5"]
          for item in executable_candidates:
              repository = item.get("repository") or ""
              if not repository:
                  continue
              if repository_dispatch_counts.get(repository, 0) >= 5:
                  continue
              task_sequence = len(selected_executions) + 1
              worker = worker_names[(task_sequence - 1) % len(worker_names)]
              selected_executions.append({
                  "worker": worker,
                  "task_sequence": task_sequence,
                  "repository": repository,
                  "issue_number": int(item.get("issue_number") or 0),
                  "issue_url": item.get("url") or "",
                  "title": item.get("title") or "",
                  "reward": float(item.get("reward", 0) or 0),
                  "score": float(item.get("score", 0) or 0),
                  "payment_verification": item.get("payment_verification") or "UNVERIFIED",
                  "submission_key": execution_key(item),
                  "status": "DISPATCHED",
                  "reserved_at": NOW.isoformat(),
              })
              repository_dispatch_counts[repository] = repository_dispatch_counts.get(repository, 0) + 1
              submissions_history[execution_key(item)] = {
                  "state": "reserved",
                  "repository": repository,
                  "issue_number": int(item.get("issue_number") or 0),
                  "issue_url": item.get("url") or "",
                  "title": item.get("title") or "",
                  "reward": float(item.get("reward", 0) or 0),
                  "worker": worker,
                  "reserved_at": NOW.isoformat(),
                  "reserved_at_ts": time.time(),
                  "workflow_run_id": os.environ.get("GITHUB_RUN_ID", ""),
              }
              # Safe test remains one local task. Production supplies up to five tasks
              # per worker lane. Repositories may supply multiple distinct qualified issues.
              # GitHub's max-parallel=5 keeps five live slots and automatically starts the
              # next queued task whenever one finishes, skips, or fails.
              dispatch_limit = (
                  1
                  if os.environ.get("REQUESTED_EXECUTION_MODE", "scan_only") == "safe_test"
                  else int(config.get("parallel_workers", 5)) * 5
              )
              if len(selected_executions) >= dispatch_limit:
                  break

          SUBMISSIONS_FILE.write_text(
              json.dumps(submissions_history, indent=2, ensure_ascii=False),
              encoding="utf-8",
          )

          EXECUTION_FILE.write_text(
              json.dumps({
                  "version": "V50",
                  "generated_at": GENERATED_AT,
                  "automatic_execution": True,
                  "workers_requested": 5,
                  "tasks_dispatched": len(selected_executions),
                  "tasks": selected_executions,
              }, indent=2, ensure_ascii=False),
              encoding="utf-8",
          )

          quick_wins = [
              item for item in execution_queue
              if 5 <= float(item.get("reward", 0)) <= 100
              and not item.get("assignees")
              and int(item.get("open_competing_prs", 0)) == 0
          ]
          instant_priority_candidates = [item for item in execution_queue if item.get("instant_payment_priority")]
          fast_paypal_candidates = [item for item in execution_queue if item.get("fast_pay_candidate")]
          ai_clear_candidates = [item for item in execution_queue if item.get("ai_eligibility") == "EXPLICITLY ALLOWED"]
          approval_path_candidates = [item for item in execution_queue if item.get("approval_authority") != "NOT VERIFIED"]
          alex_recommendation = (
              f"EXTRA EXTRA PRIORITY: dispatch {len(instant_priority_candidates)} advertised instant-payment candidate(s) before every ordinary task."
              if instant_priority_candidates
              else f"Immediately review {len(fast_paypal_candidates)} small fast-pay lead(s)."
              if fast_paypal_candidates
              else f"Review {len(quick_wins)} unassigned quick-win candidate(s) first; verify AI permission and payer authority."
              if quick_wins
              else "No clean fast-pay quick win found in this scan; continue scanning."
          )
          maintenance.update({
              "doctor": "Dr. Alex",
              "health": status,
              "last_check": GENERATED_AT,
              "api_errors": len(api_errors),
              "searches_completed": searches_completed,
              "atlas_searches_completed": worker_searches_completed["Atlas"],
              "alex_searches_completed": worker_searches_completed["Alex"],
              "alex_raw_hits": worker_raw_hits["Alex"],
              "alex_fresh_discoveries": len(worker_fresh_urls["Alex"]),
              "alex_retry_triggered": alex_retry_triggered,
              "alex_search_failure": alex_search_failure,
              "alex_search_status": (
                  "FAILED" if alex_search_failure
                  else "RETRIED_AND_ACTIVE" if alex_retry_triggered
                  else "ACTIVE"
              ),
              "quick_wins_found": len(quick_wins),
              "instant_payment_extra_priority_candidates": len(instant_priority_candidates),
              "fast_paypal_candidates": len(fast_paypal_candidates),
              "ai_explicitly_allowed_candidates": len(ai_clear_candidates),
              "approval_path_candidates": len(approval_path_candidates),
              "priority_reviews": counts.get("PRIORITY REVIEW", 0),
              "pursue_candidates": counts.get("PURSUE", 0),
              "best_immediate_target": (
                  execution_queue[0].get("url")
                  if execution_queue
                  else None
              ),
              "recommendation": alex_recommendation,
              "instant_money_warning": (
                  "Small PayPal bounties may pay quickly after acceptance, but only the bounty owner or platform can approve work and release payment. "
                  "Atlas ranks advertised instant/same-day/within-hours fiat tasks ahead of every ordinary task, while still recording that payment is not guaranteed."
              ),
          })
          MAINTENANCE_FILE.write_text(json.dumps(maintenance, indent=2, ensure_ascii=False), encoding="utf-8")

          alerts = []
          if counts["PURSUE"]:
              alerts.append({"level": "HIGH", "message": f"{counts['PURSUE']} pursue candidate(s) found", "generated_at": GENERATED_AT})
          if api_errors:
              alerts.append({"level": "WARNING", "message": f"Atlas health is {status}: {len(api_errors)} API error(s)", "generated_at": GENERATED_AT})
          if alex_search_failure:
              alerts.append({"level": "CRITICAL", "message": "Alex is not searching: zero completed queries after automatic retry", "generated_at": GENERATED_AT})
          elif alex_retry_triggered:
              alerts.append({"level": "RECOVERY", "message": f"Alex search recovered automatically and completed {worker_searches_completed['Alex']} fallback queries", "generated_at": GENERATED_AT})
          if overdue:
              alerts.append({"level": "PAYMENT", "message": f"${overdue:,.2f} is overdue", "generated_at": GENERATED_AT})
          ALERTS_FILE.write_text(json.dumps(alerts, indent=2), encoding="utf-8")

          payload = {
              "version": "V50",
              "owner": "Mazen Farkouh",
              "generated_at": GENERATED_AT,
              "config": config,
              "earnings": earnings,
              "allocations": allocations,
              "payment_schedule": payment_schedule,
              "execution_queue": execution_queue,
              "alerts": alerts,
              "system_status": status,
              "manual_verification_required": False,
              "automatic_execution": True,
              "selected_executions": selected_executions,
              "automation_boundary": (
                  "Atlas and Alex automatically dispatch every eligible simple, "
                  "uncontested tasks. Submission still depends on configured "
                  "GitHub and AI credentials; payment remains controlled by maintainers."
              ),
              "searches_completed": (
                  searches_completed
              ),
              "api_calls": api_calls,
              "api_errors": api_errors,
              "raw_issues_found": len(raw_issues),
              "aggregator_pages_rejected": (
                  rejected_aggregators
              ),
              "unsafe_items_rejected": (
                  rejected_unsafe
              ),
              (
                  "items_without_extractable_"
                  "reward_rejected"
              ): rejected_no_reward,
              "eligible_candidates_found": (
                  len(initial_candidates)
              ),
              "deep_verified_candidates": (
                  len(verified_results)
              ),
              "counts": counts,
              "contested_count": (
                  contested_count
              ),
              "assigned_count": assigned_count,
              "strong_uncontested_targets": (
                  len(strong_targets)
              ),
              "meaningful_changes": (
                  meaningful_changes
              ),
              "lifecycle_summary": lifecycle_summary,
              "top_results": top_results,
              "all_verified_results": (
                  verified_results
              ),
          }

          WORKER_HEALTH_FILE.write_text(
              json.dumps(
                  {
                      "version": "V50",
                      "last_completed_at": NOW.isoformat(),
                      "last_completed_display": GENERATED_AT,
                      "trigger": os.environ.get("GITHUB_EVENT_NAME", "unknown"),
                      "status": status,
                      "target_interval_minutes": 15,
                      "atlas_role": "discover and execute first eligible task",
                      "alex_role": "execute a different eligible task in parallel",
                  },
                  indent=2,
              ),
              encoding="utf-8",
          )

          CURRENT_FILE.write_text(
              json.dumps(
                  payload,
                  indent=2,
                  ensure_ascii=False,
              ),
              encoding="utf-8",
          )

          history = load_history()

          history.append(
              {
                  "generated_at": GENERATED_AT,
                  "system_status": status,
                  "raw_issues_found": (
                      len(raw_issues)
                  ),
                  "eligible_candidates_found": (
                      len(initial_candidates)
                  ),
                  "deep_verified_candidates": (
                      len(verified_results)
                  ),
                  "counts": counts,
                  "contested_count": (
                      contested_count
                  ),
                  "assigned_count": (
                      assigned_count
                  ),
                  "strong_uncontested_targets": (
                      len(strong_targets)
                  ),
                  "meaningful_change_count": (
                      len(meaningful_changes)
                  ),
                  "lifecycle_summary": lifecycle_summary,
              }
          )

          HISTORY_FILE.write_text(
              json.dumps(
                  history[-500:],
                  indent=2,
                  ensure_ascii=False,
              ),
              encoding="utf-8",
          )

          def badge_class(decision):
              return {
                  "PURSUE": "pursue",
                  "PRIORITY REVIEW": "review",
                  "WATCHLIST": "watch",
                  "REJECT": "reject",
              }.get(
                  decision,
                  "watch",
              )

          rows = []

          for item in top_results:
              title = html.escape(
                  item["title"]
              )

              url = html.escape(
                  item["url"],
                  quote=True,
              )

              decision = html.escape(
                  item["decision"]
              )

              availability = html.escape(
                  item["availability"]
              )

              change = html.escape(
                  item["change"]
              )

              risks = html.escape(
                  "; ".join(
                      item["risks"][:3]
                  )
                  or "None detected"
              )

              rows.append(
                  "<tr>"
