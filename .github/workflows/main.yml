              return repository, number

          def title_repository_mismatch(title, repository):
              title_repositories = re.findall(
                  r"\[([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+)\]",
                  title or "",
              )
              if not title_repositories:
                  return False, ""

              actual = (repository or "").lower()
              for advertised in title_repositories:
                  if advertised.lower() != actual:
                      return True, advertised

              return False, ""

