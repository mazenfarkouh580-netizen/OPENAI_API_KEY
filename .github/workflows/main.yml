name: Atlas + Alex V50 — Immutable ATM Deployment Repair

run-name: >-
  ${{ github.event_name == 'schedule' && github.event.schedule == '6,21,36,51 * * * *' && 'Atlas V50 Watchdog Health Check' || github.event_name == 'schedule' && 'Atlas V50 Main Production' || github.event_name == 'repository_dispatch' && 'Atlas V50 Watchdog Recovery' || format('Atlas V50 Manual — {0}', github.event.inputs.execution_mode) }}

on:
  workflow_dispatch:
    inputs:
      execution_mode:
        description: "Choose scan only, safe local test, or submit a verified pull request"
        required: true
        type: choice
        default: submit
        options:
          - submit
          - safe_test
          - scan_only
  repository_dispatch:
    types: [atlas-scheduled-run, atlas-watchdog-recovery]
  schedule:
    # Main hunt: every 15 minutes.
    - cron: "8,23,38,53 * * * *"
    # Watchdog: thirteen minutes after each main slot, after the ten-minute worker window.
    - cron: "6,21,36,51 * * * *"

concurrency:
  # Keep production runs serialized, but never make the watchdog wait behind
  # a long execution job. The original single group blocked watchdog recovery.
  group: ${{ github.event_name == 'schedule' && github.event.schedule == '6,21,36,51 * * * *' && 'atlas-alex-v46-watchdog' || 'atlas-alex-v46-production' }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  hunt:
    outputs:
      execution_matrix: ${{ steps.atlas.outputs.execution_matrix }}
      pursue_count: ${{ steps.atlas.outputs.pursue_count }}
      system_status: ${{ steps.atlas.outputs.system_status }}
      execution_ready: ${{ steps.atlas.outputs.execution_ready }}
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch' ||
      github.event.schedule == '8,23,38,53 * * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Download repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Atlas and Alex — discover, select, and dispatch work
        id: atlas
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED_EXECUTION_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.execution_mode || 'submit' }}
