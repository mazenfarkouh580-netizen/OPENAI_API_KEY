              f"<td><span class='badge {badge_class(item['decision'])}'>{html.escape(item['decision'])}</span></td>"
              f"<td>${item['expected_value']:,.2f}</td>"
              f"<td>{item['payment_confidence']:.0f}%</td>"
              f"<td>{item['competition_score']:.0f}%</td>"
              f"<td><a href='{html.escape(item['url'], quote=True)}' target='_blank' rel='noopener'>{html.escape(item['title'])}</a></td>"
              "</tr>"
              for index, item in enumerate(execution_queue[:12], 1)
          ) or "<tr><td colspan='6'>No queued opportunities.</td></tr>"

          payment_rows = "".join(
              "<tr>"
              f"<td>{html.escape(str(item['title']))}</td>"
              f"<td>${item['amount']:,.2f}</td>"
              f"<td>{html.escape(str(item.get('expected_at') or 'Unknown'))}</td>"
              f"<td>{html.escape(item['bucket'])}</td>"
              "</tr>"
              for item in payment_schedule[:20]
