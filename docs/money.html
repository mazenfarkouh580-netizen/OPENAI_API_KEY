<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Atlas ATM</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      padding: 18px; font-family: system-ui,-apple-system,"Segoe UI",sans-serif;
      background: #080c11; color: #f4f7fb;
    }
    main { width: min(760px,100%); }
    h1 { text-align:center; margin:0 0 18px; font-size:1.15rem; letter-spacing:.14em; }
    .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    .card { padding:24px; border:1px solid #303945; border-radius:16px; background:#111821; }
    .value { font-size:clamp(2rem,8vw,4rem); font-weight:850; }
    .name { margin-top:5px; opacity:.7; }
    .note { margin-top:16px; text-align:center; opacity:.62; font-size:.86rem; }
    @media(max-width:540px) { .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main>
    <h1>ATLAS ATM — VERIFIED CASH</h1>
    <section class="grid">
      <div class="card"><div class="value" id="today">$0.00</div><div class="name">Today</div></div>
      <div class="card"><div class="value" id="week">$0.00</div><div class="name">This Week</div></div>
      <div class="card"><div class="value" id="month">$0.00</div><div class="name">This Month</div></div>
      <div class="card"><div class="value" id="year">$0.00</div><div class="name">This Year</div></div>
    </section>
    <div class="note" id="note">Only documented received payments are counted.</div>
  </main>
  <script>
    const money = value => '$' + Number(value || 0).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
    async function refreshMoney() {
      try {
        const response = await fetch('money-data.json?t=' + Date.now(), {cache:'no-store'});
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        for (const key of ['today','week','month','year']) {
          document.getElementById(key).textContent = money(data[key]);
        }
        document.getElementById('note').textContent =
          'Verified cash only · Updated ' + (data.generated_at || 'recently');
      } catch (error) {
        document.getElementById('note').textContent = 'Refresh failed; retrying automatically.';
      }
    }
    refreshMoney();
    setInterval(refreshMoney, 900000);
    window.addEventListener('focus', refreshMoney);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) refreshMoney(); });
  </script>
</body>
</html>
